version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-orchestrator-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    environment:
      PORT: "8000"
    command: >
      sh -c "uvicorn src.api.fastapi_app:app
        --host 0.0.0.0
        --port $${PORT}
        --workers 1
        --log-level info"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Streamlit frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-orchestrator-ui
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
      - ./src:/app/src
    command: >
      streamlit run frontend/streamlit_app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --browser.gatherUsageStats false
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
